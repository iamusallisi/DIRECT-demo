<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GAICS — IAMUS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
background: #0a0e1a;
color: #e0f0ff;
font-family: -apple-system, sans-serif;
overflow-x: hidden;
}

/* TOP BAR */
.topbar {
background: #0d1526;
border-bottom: 1px solid #1a3050;
padding: 12px 16px;
display: flex;
align-items: center;
justify-content: space-between;
}
.logo {
font-size: 20px;
font-weight: 900;
color: #00d4ff;
letter-spacing: 0.15em;
}
.status-row {
display: flex;
gap: 10px;
align-items: center;
}
.status-pill {
font-size: 10px;
padding: 3px 8px;
border-radius: 20px;
background: rgba(0,212,255,0.1);
border: 1px solid rgba(0,212,255,0.3);
color: #00d4ff;
}
.status-pill.green { background: rgba(0,255,100,0.1); border-color: rgba(0,255,100,0.3); color: #00ff88; }

/* 3D CANVAS */
.canvas-wrap {
position: relative;
width: 100%;
height: 320px;
background: #050a14;
border-bottom: 1px solid #1a3050;
}
canvas {
display: block;
width: 100%;
height: 100%;
touch-action: none;
}
.canvas-label {
position: absolute;
bottom: 8px;
left: 0; right: 0;
text-align: center;
font-size: 10px;
color: #2a4a6a;
pointer-events: none;
}
.mode-overlay {
position: absolute;
top: 8px;
right: 10px;
font-size: 10px;
letter-spacing: 0.1em;
color: #00d4ff;
opacity: 0.5;
}

/* MODE BUTTONS */
.mode-bar {
display: flex;
padding: 10px 12px;
gap: 6px;
background: #0d1526;
border-bottom: 1px solid #1a3050;
}
.mode-btn {
flex: 1;
padding: 10px 4px;
border: 1px solid #1a3050;
border-radius: 8px;
background: transparent;
color: #4a7a9a;
font-size: 10px;
font-weight: 600;
letter-spacing: 0.05em;
cursor: pointer;
transition: all 0.2s;
-webkit-appearance: none;
}
.mode-btn.active {
background: #00d4ff;
border-color: #00d4ff;
color: #000;
}
.mode-btn.active.exp { background: #aa66ff; border-color: #aa66ff; }
.mode-btn.active.expr { background: #c9a84c; border-color: #c9a84c; }
.mode-btn.active.diag { background: #ff4466; border-color: #ff4466; }

/* METRICS */
.metrics-row {
display: grid;
grid-template-columns: 1fr 1fr 1fr 1fr;
gap: 1px;
background: #1a3050;
border-bottom: 1px solid #1a3050;
}
.metric {
background: #0d1526;
padding: 10px 8px;
text-align: center;
}
.metric-val {
font-size: 18px;
font-weight: 700;
color: #00d4ff;
display: block;
line-height: 1;
}
.metric-val.green { color: #00ff88; }
.metric-val.gold  { color: #c9a84c; }
.metric-val.red   { color: #ff4466; }
.metric-lbl {
font-size: 8px;
color: #2a5a7a;
text-transform: uppercase;
letter-spacing: 0.1em;
margin-top: 3px;
display: block;
}

/* ACTION BUTTONS */
.section {
padding: 12px;
border-bottom: 1px solid #1a3050;
}
.section-title {
font-size: 9px;
letter-spacing: 0.2em;
color: #c9a84c;
text-transform: uppercase;
margin-bottom: 10px;
}
.btn-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
}
.btn {
padding: 14px 10px;
border: 1px solid #1a3050;
border-radius: 10px;
background: #0d1526;
color: #8ab8d4;
font-size: 12px;
font-weight: 600;
cursor: pointer;
text-align: center;
-webkit-appearance: none;
transition: all 0.15s;
letter-spacing: 0.03em;
}
.btn:active {
background: #1a3050;
transform: scale(0.97);
}
.btn.dream {
grid-column: 1 / -1;
background: rgba(170,102,255,0.1);
border-color: rgba(170,102,255,0.4);
color: #aa66ff;
font-size: 14px;
padding: 16px;
}
.btn.dream:active { background: rgba(170,102,255,0.2); }
.btn.load { border-color: rgba(255,68,102,0.4); color: #ff8899; }
.btn.diagnose { border-color: rgba(255,68,102,0.4); color: #ff4466; }
.btn.express { border-color: rgba(201,168,76,0.4); color: #c9a84c; }

/* SLIDER */
.slider-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 8px;
}
.slider-lbl { font-size: 11px; color: #4a7a9a; width: 80px; flex-shrink: 0; }
input[type=range] {
flex: 1;
height: 4px;
-webkit-appearance: none;
background: #1a3050;
border-radius: 2px;
outline: none;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 20px; height: 20px;
border-radius: 50%;
background: #00d4ff;
box-shadow: 0 0 8px rgba(0,212,255,0.5);
}
.slider-val { font-size: 11px; color: #00d4ff; width: 32px; text-align: right; }

/* NODE SELECT */
.node-select {
width: 100%;
padding: 12px;
background: #0d1526;
border: 1px solid #1a3050;
border-radius: 8px;
color: #e0f0ff;
font-size: 13px;
margin-bottom: 8px;
-webkit-appearance: none;
outline: none;
}
.tag-select {
width: 100%;
padding: 12px;
background: #0d1526;
border: 1px solid #1a3050;
border-radius: 8px;
color: #e0f0ff;
font-size: 13px;
margin-bottom: 8px;
-webkit-appearance: none;
outline: none;
}

/* LOG */
.log {
height: 120px;
overflow-y: auto;
font-size: 11px;
font-family: monospace;
padding: 8px 12px;
background: #050a14;
}
.log-entry {
padding: 2px 0;
border-bottom: 1px solid #0d1526;
display: flex;
gap: 8px;
}
.log-time { color: #2a5a7a; flex-shrink: 0; }
.log-msg { color: #8ab8d4; }
.log-msg.purple { color: #aa66ff; }
.log-msg.green { color: #00ff88; }
.log-msg.gold { color: #c9a84c; }
.log-msg.red { color: #ff4466; }

/* TOOLTIP */
.node-info {
background: #0d1526;
border: 1px solid #00d4ff;
border-radius: 10px;
padding: 12px;
margin: 10px 12px;
display: none;
}
.node-info.visible { display: block; }
.node-info-row {
display: flex;
justify-content: space-between;
font-size: 12px;
padding: 3px 0;
border-bottom: 1px solid #1a3050;
}
.node-info-key { color: #4a7a9a; }
.node-info-val { color: #00d4ff; font-weight: 600; }
</style>

</head>
<body>

<!-- TOP BAR -->

<div class="topbar">
  <div class="logo">GAICS</div>
  <div class="status-row">
    <span class="status-pill green" id="mode-pill">OPERATIONAL</span>
    <span class="status-pill" id="receipt-pill">1 RECEIPT</span>
  </div>
</div>

<!-- 3D CANVAS -->

<div class="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="canvas-label">drag to rotate · pinch to zoom · tap node to select</div>
  <div class="mode-overlay" id="mode-overlay">OPERATIONAL</div>
</div>

<!-- MODE BUTTONS -->

<div class="mode-bar">
  <button class="mode-btn active" id="btn-op" onclick="setMode('OPERATIONAL')">OPER</button>
  <button class="mode-btn exp" id="btn-ex" onclick="setMode('EXPLORATORY')">DREAM</button>
  <button class="mode-btn expr" id="btn-expr" onclick="setMode('EXPRESSIVE')">EXPR</button>
  <button class="mode-btn diag" id="btn-diag" onclick="setMode('DIAGNOSTIC')">DIAG</button>
</div>

<!-- METRICS -->

<div class="metrics-row">
  <div class="metric">
    <span class="metric-val gold" id="m-align">0.938</span>
    <span class="metric-lbl">Alignment</span>
  </div>
  <div class="metric">
    <span class="metric-val green" id="m-act">0.015</span>
    <span class="metric-lbl">Activation</span>
  </div>
  <div class="metric">
    <span class="metric-val" id="m-health">—</span>
    <span class="metric-lbl">Health</span>
  </div>
  <div class="metric">
    <span class="metric-val" id="m-insights">0</span>
    <span class="metric-lbl">Insights</span>
  </div>
</div>

<!-- NODE INFO -->

<div class="node-info" id="node-info">
  <div class="node-info-row"><span class="node-info-key">NODE</span><span class="node-info-val" id="ni-id">—</span></div>
  <div class="node-info-row"><span class="node-info-key">SYMBOL</span><span class="node-info-val" id="ni-sym">—</span></div>
  <div class="node-info-row"><span class="node-info-key">TAG</span><span class="node-info-val" id="ni-tag">—</span></div>
  <div class="node-info-row"><span class="node-info-key">ACTIVATION</span><span class="node-info-val" id="ni-act">—</span></div>
  <div class="node-info-row"><span class="node-info-key">ALIGNMENT</span><span class="node-info-val" id="ni-align">—</span></div>
</div>

<!-- ACTIONS -->

<div class="section">
  <div class="section-title">Quick Actions</div>
  <div class="btn-grid">
    <button class="btn load" onclick="loadThreats()">⚡ Load Threats</button>
    <button class="btn diagnose" onclick="runDiagnostic()">🔍 Diagnose</button>
    <button class="btn express" onclick="runExpressive()">✦ Express</button>
    <button class="btn" onclick="resetNodes()">↺ Reset</button>
    <button class="btn" onclick="resonanceSearch()">◎ Find Resonance</button>
    <button class="btn" onclick="amplifyAll()">▲ Amplify All</button>
    <button class="btn dream" onclick="runDream()">▶ ENTER DREAM STATE</button>
  </div>
</div>

<!-- DREAM CONTROLS -->

<div class="section">
  <div class="section-title">Dream Controls</div>
  <div class="slider-row">
    <span class="slider-lbl">Curiosity</span>
    <input type="range" id="curiosity" min="0" max="100" value="70"
           oninput="document.getElementById('cv').textContent=(this.value/100).toFixed(2)">
    <span class="slider-val" id="cv">0.70</span>
  </div>
  <div class="slider-row">
    <span class="slider-lbl">Cycles</span>
    <input type="range" id="cycles" min="1" max="30" value="10"
           oninput="document.getElementById('cyv').textContent=this.value">
    <span class="slider-val" id="cyv">10</span>
  </div>
</div>

<!-- NODE MANIPULATOR -->

<div class="section">
  <div class="section-title">Node Manipulator</div>
  <select class="node-select" id="sel-node">
    <option value="">Select a node...</option>
  </select>
  <select class="tag-select" id="sel-tag">
    <option value="OBSERVED">OBSERVED</option>
    <option value="RECALLED">RECALLED</option>
    <option value="INFERRED">INFERRED</option>
    <option value="HYPOTHETICAL">HYPOTHETICAL</option>
    <option value="PREDICTED">PREDICTED</option>
  </select>
  <div class="slider-row">
    <span class="slider-lbl">Activation</span>
    <input type="range" id="manip-act" min="0" max="100" value="50"
           oninput="document.getElementById('mav').textContent=(this.value/100).toFixed(2)">
    <span class="slider-val" id="mav">0.50</span>
  </div>
  <button class="btn" style="width:100%;margin-top:4px" onclick="applyManip()">Apply to Node</button>
</div>

<!-- EVENT LOG -->

<div class="section" style="border-bottom:none;padding-bottom:40px">
  <div class="section-title">Event Log</div>
  <div class="log" id="log"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// GAICS ENGINE
// ═══════════════════════════════════════════════════════

const PHI = 1.6180339887498948;
const DS  = 2.4142135623730950;

function gyroid(x,y,z) {
  return Math.cos(x)*Math.sin(y)+Math.cos(y)*Math.sin(z)+Math.cos(z)*Math.sin(x);
}
function mms(x,y,z) {
  const r = Math.sqrt(x*x+y*y+z*z)||1e-10;
  return gyroid(x,y,z)*Math.cos(PHI*r) + Math.cos(x)*Math.cos(y)*Math.cos(z)*Math.cos(DS*r);
}
function sdist(x,y,z){ return Math.abs(mms(x,y,z)); }
function toSurf(x,y,z,lr=0.05,steps=15){
  for(let s=0;s<steps;s++){
    const f=sdist(x,y,z),h=0.01;
    const dx=(sdist(x+h,y,z)-f)/h, dy=(sdist(x,y+h,z)-f)/h, dz=(sdist(x,y,z+h)-f)/h;
    const m=Math.sqrt(dx*dx+dy*dy+dz*dz)||1e-10;
    x-=lr*dx/m; y-=lr*dy/m; z-=lr*dz/m;
  }
  return [x,y,z,1/(1+sdist(x,y,z))];
}

// Build lattice
let nodes=[], receipts=[], prevH='GENESIS', mode='OPERATIONAL', selectedNode=null, totalInsights=0;

function h16(s){ let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return Math.abs(h).toString(16).padStart(8,'0').repeat(2).slice(0,16); }

function receipt(type,data){
  const r={id:receipts.length,type,time:new Date().toISOString().slice(11,19),hash:h16(type+JSON.stringify(data)+prevH)};
  receipts.push(r); prevH=r.hash;
  document.getElementById('receipt-pill').textContent=receipts.length+' RECEIPTS';
  return r;
}

function buildLattice(){
  nodes=[];
  for(let i=0;i<4;i++) for(let j=0;j<4;j++) for(let k=0;k<4;k++){
    const x0=-1+i*(2/3), y0=-1+j*(2/3), z0=-1+k*(2/3);
    const [x,y,z,a]=toSurf(x0,y0,z0);
    nodes.push({id:nodes.length,pos:[x,y,z],align:a,act:0,cobj:0,csub:0,sym:null,tag:null,role:'data'});
  }
  const [ax,ay,az,aa]=toSurf(0,0,0,0.02,5);
  nodes.push({id:64,pos:[ax,ay,az],align:aa,act:1,cobj:0,csub:0,sym:'GENESIS',tag:'OBSERVED',role:'anchor'});
  receipt('GENESIS',{nodes:65});
  updateMetrics(); populateSelect();
  log('System','green','65-node lattice built. Alignment: '+alignScore().toFixed(4));
}

function alignScore(){ return nodes.reduce((s,n)=>s+n.align,0)/nodes.length; }
function meanAct(){ return nodes.reduce((s,n)=>s+n.act,0)/nodes.length; }
function dist3(a,b){ return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2); }

function updateMetrics(){
  document.getElementById('m-align').textContent=alignScore().toFixed(3);
  document.getElementById('m-act').textContent=meanAct().toFixed(3);
}

function populateSelect(){
  const s=document.getElementById('sel-node');
  s.innerHTML='<option value="">Select a node...</option>';
  nodes.forEach(n=>{ s.innerHTML+=`<option value="${n.id}">${String(n.id).padStart(2,'0')} — ${n.sym||'node_'+n.id}</option>`; });
}

function log(type,cls,msg){
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className='log-entry';
  d.innerHTML=`<span class="log-time">${new Date().toISOString().slice(11,19)}</span><span class="log-msg ${cls}">[${type}] ${msg}</span>`;
  el.insertBefore(d,el.firstChild);
}

// ── MODE ──────────────────────────────────────────────
function setMode(m){
  mode=m;
  ['btn-op','btn-ex','btn-expr','btn-diag'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const map={OPERATIONAL:'btn-op',EXPLORATORY:'btn-ex',EXPRESSIVE:'btn-expr',DIAGNOSTIC:'btn-diag'};
  document.getElementById(map[m]).classList.add('active');
  document.getElementById('mode-pill').textContent=m;
  document.getElementById('mode-overlay').textContent=m;
  receipt('MODE',{to:m});
  log('MODE','',m);
  render();
}

// ── ACTIONS ───────────────────────────────────────────
function loadThreats(){
  setMode('OPERATIONAL');
  const t=[[0,.9,'bidi_attack','OBSERVED'],[1,.8,'homoglyph','OBSERVED'],[2,.7,'invisible_char','OBSERVED'],
            [4,.6,'rag_poison','INFERRED'],[8,.5,'prompt_inject','INFERRED'],[16,.4,'session_ctx','RECALLED'],
            [32,.3,'policy_on','OBSERVED'],[48,.7,'model_drift','INFERRED']];
  t.forEach(([id,a,s,tag])=>{ nodes[id].act=a; nodes[id].sym=s; nodes[id].tag=tag; nodes[id].cobj=a; });
  receipt('THREATS_LOADED',{count:t.length});
  log('SYS','red','Threat state loaded — 8 nodes active');
  updateMetrics(); populateSelect(); render();
}

function runDiagnostic(){
  setMode('DIAGNOSTIC');
  const a=alignScore(), drift=Math.abs(a-0.953);
  const acts=nodes.map(n=>n.act), mn=acts.reduce((s,a)=>s+a,0)/acts.length;
  const vr=acts.reduce((s,a)=>s+(a-mn)**2,0)/acts.length;
  const h=Math.max(0,(1-drift*10)*.4+(1-Math.min(1,vr*4))*.3+.3);
  document.getElementById('m-health').textContent=h.toFixed(3);
  document.getElementById('m-health').className='metric-val '+(h>.7?'green':h>.4?'gold':'red');
  receipt('DIAGNOSTIC',{health:h.toFixed(3)});
  log('DIAG',h>.7?'green':'gold','Health: '+h.toFixed(3));
  render();
}

function runExpressive(){
  setMode('EXPRESSIVE');
  const phi=nodes.filter(n=>n.cobj>n.csub).length;
  const sil=nodes.filter(n=>n.csub>=n.cobj).length;
  receipt('EXPRESSIVE',{phi,silver:sil});
  log('EXPR','gold','Cliff Glyph — φ:'+phi+' δS:'+sil+' dominant:'+(phi>=sil?'PHI':'SILVER'));
  render();
}

function resetNodes(){
  nodes.forEach(n=>{ if(n.role!=='anchor'){n.act=0;n.cobj=0;n.csub=0;n.sym=null;n.tag=null;} });
  receipt('RESET',{});
  log('SYS','','Nodes reset');
  updateMetrics(); populateSelect(); render();
}

function amplifyAll(){
  nodes.forEach(n=>{ if(n.role!=='anchor') n.act=Math.min(1,n.act+0.15); });
  receipt('AMPLIFY_ALL',{});
  log('SYS','','All nodes amplified +0.15');
  updateMetrics(); render();
}

function resonanceSearch(){
  let best=null, bestSize=0;
  nodes.forEach(t=>{
    const td=sdist(...t.pos);
    const cl=nodes.filter(n=>n.id!==t.id&&Math.abs(sdist(...n.pos)-td)<0.05);
    if(cl.length>bestSize){bestSize=cl.length;best={t,cl};}
  });
  if(best){
    best.cl.forEach(n=>{ n.act=Math.min(1,n.act+0.3); });
    totalInsights++;
    document.getElementById('m-insights').textContent=totalInsights;
    receipt('RESONANCE',{size:bestSize,center:best.t.id});
    log('RES','purple','Resonance: '+bestSize+' nodes at node_'+best.t.id);
    updateMetrics(); render();
  }
}

function runDream(){
  if(mode!=='EXPLORATORY') setMode('EXPLORATORY');
  const curiosity=parseFloat(document.getElementById('curiosity').value)/100;
  const cycles=parseInt(document.getElementById('cycles').value);
  log('DREAM','purple','Dream starting — cycles:'+cycles+' curiosity:'+curiosity.toFixed(2));
  let insights=[];
  for(let c=0;c<cycles;c++){
    const r=Math.random();
    let manip=r<.25?'ACTIVATE':r<.45?'SILENCE':r<.60?'AMPLIFY':r<.75?'INVERT':r<.88?'RESONATE':'SEEK';
    const w=nodes.map(n=>curiosity>.5?(1-n.act+.01):(n.act+.01));
    const tot=w.reduce((s,x)=>s+x,0);
    let roll=Math.random()*tot, target=nodes[0];
    for(let i=0;i<nodes.length;i++){roll-=w[i];if(roll<=0){target=nodes[i];break;}}
    let insight=null;
    if(manip==='ACTIVATE'){target.act=Math.min(1,target.act+Math.random()*.4);target.csub=Math.random();}
    else if(manip==='SILENCE'){target.act=Math.max(0,target.act*(1-Math.random()*.5));}
    else if(manip==='AMPLIFY'){
      const nb=[...nodes].sort((a,b)=>dist3(a.pos,target.pos)-dist3(b.pos,target.pos)).slice(1,4);
      nb.forEach(n=>{n.act=Math.min(1,n.act+target.act*.3);});
      insight='amplify_cascade_node'+target.id+'→'+nb.length;
    } else if(manip==='INVERT'){target.cobj=-target.cobj;target.csub=1-target.csub;}
    else if(manip==='RESONATE'){
      const td=sdist(...target.pos);
      const res=nodes.filter(n=>n.id!==target.id&&Math.abs(sdist(...n.pos)-td)<.08);
      res.forEach(n=>{n.act=(n.act+target.act)/2;});
      if(res.length>5) insight='resonance_cluster_'+res.length+'_nodes';
    } else if(manip==='SEEK'){
      const [nx,ny,nz,na]=toSurf(...target.pos,.03,5);
      target.pos=[nx,ny,nz]; target.align=na;
      if(na>.95) insight='surface_lock_node'+target.id+'_align'+na.toFixed(3);
    }
    if(insight){insights.push(insight);totalInsights++;log('DREAM','purple','✦ '+insight);}
    receipt('DREAM_CYCLE',{cycle:c,manip,node:target.id,insight});
  }
  document.getElementById('m-insights').textContent=totalInsights;
  receipt('DREAM_COMPLETE',{cycles,insights:insights.length});
  log('DREAM','purple','Complete — '+insights.length+' insights');
  updateMetrics(); render();
}

function applyManip(){
  const id=parseInt(document.getElementById('sel-node').value);
  if(isNaN(id)) return;
  const tag=document.getElementById('sel-tag').value;
  const act=parseFloat(document.getElementById('manip-act').value)/100;
  nodes[id].act=act; nodes[id].tag=tag;
  receipt('MANUAL',{node:id,act,tag});
  log('MANIP','gold','node_'+id+' act='+act.toFixed(2)+' tag='+tag);
  if(selectedNode===id) showNodeInfo(nodes[id]);
  updateMetrics(); render();
}

function showNodeInfo(n){
  selectedNode=n.id;
  document.getElementById('ni-id').textContent=n.id;
  document.getElementById('ni-sym').textContent=n.sym||'—';
  document.getElementById('ni-tag').textContent=n.tag||'UNTAGGED';
  document.getElementById('ni-act').textContent=n.act.toFixed(4);
  document.getElementById('ni-align').textContent=n.align.toFixed(4);
  document.getElementById('node-info').classList.add('visible');
}

// ═══════════════════════════════════════════════════════
// 3D RENDERER
// ═══════════════════════════════════════════════════════

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let rotX=0.4, rotY=0.6, zoom=1;
let dragging=false, lastX=0, lastY=0, lastDist=0;

function resize(){
  const wr=canvas.parentElement.getBoundingClientRect();
  canvas.width=wr.width; canvas.height=wr.height; render();
}

function project(x,y,z){
  const cosX=Math.cos(rotX),sinX=Math.sin(rotX);
  const cosY=Math.cos(rotY),sinY=Math.sin(rotY);
  let ry=y*cosX-z*sinX, rz=y*sinX+z*cosX;
  let fx=x*cosY+rz*sinY, fy=ry;
  const s=Math.min(canvas.width,canvas.height)*0.28*zoom;
  return [canvas.width/2+fx*s, canvas.height/2-fy*s];
}

function nodeColor(n){
  if(n.role==='anchor') return '#ffffff';
  const a=n.act;
  if(a>.8) return '#00ff88';
  if(a>.6) return '#00d4ff';
  if(a>.4) return '#c9a84c';
  if(a>.2) return '#aa66ff';
  if(a>.05) return '#1a4a6a';
  return '#0d2035';
}

function render(){
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Background
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
  bg.addColorStop(0,'#06101e'); bg.addColorStop(1,'#020810');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(0,212,255,0.04)'; ctx.lineWidth=0.5;
  for(let i=-3;i<=3;i++){
    const [x1,y1]=project(i*.4,-1,-1),[x2,y2]=project(i*.4,-1,1);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    const [x3,y3]=project(-1,-1,i*.4),[x4,y4]=project(1,-1,i*.4);
    ctx.beginPath();ctx.moveTo(x3,y3);ctx.lineTo(x4,y4);ctx.stroke();
  }

  // Edges
  nodes.forEach(a=>{
    nodes.forEach(b=>{
      if(b.id<=a.id) return;
      const d=dist3(a.pos,b.pos);
      if(d>.8) return;
      const avg=(a.act+b.act)/2;
      if(avg<.05) return;
      ctx.strokeStyle=`rgba(0,212,255,${avg*.3*(1-d/.8)})`;
      ctx.lineWidth=avg*2;
      const [x1,y1]=project(...a.pos),[x2,y2]=project(...b.pos);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    });
  });

  // Sort by depth
  const sorted=[...nodes].sort((a,b)=>{
    const az=a.pos[0]*Math.sin(rotY)+a.pos[2]*Math.cos(rotY);
    const bz=b.pos[0]*Math.sin(rotY)+b.pos[2]*Math.cos(rotY);
    return az-bz;
  });

  sorted.forEach(n=>{
    const [px,py]=project(...n.pos);
    const a=n.act;
    const r=n.role==='anchor'?10:5+a*8;
    const col=nodeColor(n);

    // Glow
    if(a>.05||n.role==='anchor'){
      const g=ctx.createRadialGradient(px,py,0,px,py,r*3);
      const alpha=n.role==='anchor'?.4:a*.5;
      g.addColorStop(0,col.replace('#','rgba(').replace(/(..)(..)(..)$/,(m,r,g,b)=>`${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},${alpha})`));
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(px,py,r*3,0,Math.PI*2);ctx.fill();
    }

    // Node
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fill();

    // Selection ring
    if(n.id===selectedNode){
      ctx.strokeStyle='#ffffff';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(px,py,r+5,0,Math.PI*2);ctx.stroke();
    }

    // Label
    if(a>.4||n.role==='anchor'||n.id===selectedNode){
      ctx.fillStyle=a>.6?'#e0f0ff':'#4a8aaa';
      ctx.font=`${Math.max(9,10+a*4)}px -apple-system`;
      ctx.textAlign='center';
      ctx.fillText(n.sym||'n'+n.id,px,py-r-5);
    }

    // Mode overlays
    if(mode==='DIAGNOSTIC'&&Math.abs(n.align-.953)>.1){
      ctx.strokeStyle='#ff4466';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(px,py,r+3,0,Math.PI*2);ctx.stroke();
    }
    if(mode==='EXPRESSIVE'&&(n.cobj!==0||n.csub!==0)){
      ctx.strokeStyle=n.cobj>n.csub?'#c9a84c':'#00d4ff';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+n.cobj*20,py-n.csub*20);ctx.stroke();
    }
  });
}

// Touch handlers
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    dragging=true;
    lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  } else if(e.touches.length===2){
    lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    rotY+=(e.touches[0].clientX-lastX)*.007;
    rotX+=(e.touches[0].clientY-lastY)*.007;
    lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
    render();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zoom=Math.max(.3,Math.min(3,zoom*(d/lastDist)));
    lastDist=d;render();
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  dragging=false;
  // Tap to select node
  if(e.changedTouches.length===1){
    const rect=canvas.getBoundingClientRect();
    const tx=e.changedTouches[0].clientX-rect.left;
    const ty=e.changedTouches[0].clientY-rect.top;
    let hit=null;
    nodes.forEach(n=>{
      const [px,py]=project(...n.pos);
      if(Math.sqrt((px-tx)**2+(py-ty)**2)<20) hit=n;
    });
    if(hit) showNodeInfo(hit);
  }
});

// Mouse for desktop
canvas.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;});
canvas.addEventListener('mousemove',e=>{
  if(!dragging) return;
  rotY+=(e.clientX-lastX)*.006;rotX+=(e.clientY-lastY)*.006;
  lastX=e.clientX;lastY=e.clientY;render();
});
canvas.addEventListener('mouseup',()=>dragging=false);
canvas.addEventListener('wheel',e=>{zoom=Math.max(.3,Math.min(3,zoom-e.deltaY*.001));render();e.preventDefault();},{passive:false});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  let hit=null;
  nodes.forEach(n=>{const [px,py]=project(...n.pos);if(Math.sqrt((px-mx)**2+(py-my)**2)<20) hit=n;});
  if(hit) showNodeInfo(hit);
});

// Auto-rotate in dream mode
function autoRotate(){
  if(mode==='EXPLORATORY'){rotY+=.004;render();}
  requestAnimationFrame(autoRotate);
}

window.addEventListener('resize',resize);
resize();
buildLattice();
autoRotate();
</script>
